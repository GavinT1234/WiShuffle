openapi: 3.0.0
info:
  title: WiShuffle API
  version: 1.0.0
  description: API for collaborative music room application
  contact:
    name: Martin Anuonye
    email: manuonye@charlotte.edu

servers:
  - url: http://localhost:3000
    description: Development server

tags:
  - name: Health
    description: Health check endpoints
  - name: Videos
    description: Video management
  - name: Playlist
    description: Playlist management
  - name: Rooms
    description: Room management

paths:
  /api/health:
    get:
      summary: Health check endpoint
      description: Returns the health status of the API
      tags:
        - Health
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time

  /api/video:
    get:
      summary: Get current video
      description: Returns the currently playing video ID
      tags:
        - Videos
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  videoId:
                    type: string
                    example: dQw4w9WgXcQ

  /api/playlist:
    get:
      summary: Get playlist
      description: Returns all videos in the playlist
      tags:
        - Playlist
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      example: 1
                    title:
                      type: string
                      example: Rick Astley - Never Gonna Give You Up
                    videoId:
                      type: string
                      example: dQw4w9WgXcQ

  /api/rooms:
    get:
      summary: Get all rooms
      description: Returns a list of all music rooms
      tags:
        - Rooms
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    name:
                      type: string
                    owner:
                      type: string
                    currentSong:
                      type: string
    post:
      summary: Create a new room
      description: Creates a new music room
      tags:
        - Rooms
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - owner
              properties:
                name:
                  type: string
                  example: My Music Room
                owner:
                  type: string
                  example: User123
      responses:
        '201':
          description: Room created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  name:
                    type: string
                  owner:
                    type: string

  /api/rooms/{id}/vote:
    post:
      summary: Vote to skip current song
      description: Increment the skip vote count for a room
      tags:
        - Rooms
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Room ID
      responses:
        '200':
          description: Vote recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  skip_votes:
                    type: integer
                  skip_threshold:
                    type: integer
                  should_skip:
                    type: boolean